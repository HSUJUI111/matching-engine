version: '3.8'

services:
  postgres:
    image: postgres:15-alpine       # 使用轻量级的 PG 15 版本镜像
    container_name: matching_pg     # 给这个容器起个名字
    environment:
      POSTGRES_USER: postgres       # 💡 自动创建的用户名
      POSTGRES_PASSWORD: root       # 💡 自动创建的密码
      POSTGRES_DB: matching_db      # 💡 容器启动时，自动帮你建好这个数据库！
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"                 # 把容器内的 5432 端口映射到你电脑的 5432 端口
    volumes:
      - pgdata:/var/lib/postgresql/data # 数据持久化，防止容器重启后数据丢失
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.4
    container_name: matching_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
  kafka:
    image: confluentinc/cp-kafka:7.4.4
    container_name: matching_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # 极其重要：告诉外部程序（比如你的 Go 代码），通过 localhost:9092 来连接我
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092 
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      
volumes:
  pgdata: